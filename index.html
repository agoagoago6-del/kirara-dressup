<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>きせかえ練習</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

</head>


<body>

<h1 class="title">うさぎのきせかえ</h1>


<div class="character">

<img id="body" src="images/body.png">
<img id="dress">
<img id="accessory">
<img id="shoes">
</div>

</div>



<!-- タブボタン -->

<div class="tabs">

<button onclick="showTab('dressTab')">ドレス</button>
<button onclick="showTab('accessoryTab')">アクセ</button>
<button onclick="showTab('shoesTab')">くつ</button>

</div>



<!-- インベントリ -->

<div class="inventory">

<!-- ドレス -->

<div id="dressTab" class="tab">

<img class="dressItem" src="images/dress1.png">
<img class="dressItem" src="images/dress2.png">

<img class="dressItem" src="images/dress4.png">
<img class="dressItem" src="images/dress5.png">
</div>


<!-- アクセサリー -->

<div id="accessoryTab" class="tab">

<img class="accessoryItem" src="images/ribbon.png">

<img class="accessoryItem" src="images/bag1.png">
</div>


<!-- くつ -->

<div id="shoesTab" class="tab">

<img class="shoesItem" src="images/shoes1.png">

</div>

</div>



<script src="script.js"></script>

</body>

</html>
